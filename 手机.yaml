mixed-port: 7897
allow-lan: false # 手机端建议关闭 LAN 共享以省电
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true

dns:
  enable: true
  listen: "127.0.0.1:5335"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    ipcidr: [240.0.0.0/4, 0.0.0.0/32, 127.0.0.1/32]

proxies:


proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies: ["⚡ 自动选择", "DIRECT", 香港, 德国, 美国, 土耳其, 台湾]

  - name: "⚡ 自动选择"
    type: url-test
    proxies: [香港, 德国, 美国, 土耳其, 台湾]
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "🤖 AI 服务"
    type: select
    proxies: ["🚀 节点选择", 美国, 台湾, 香港] # AI通常禁大陆/特定区

  - name: "🛑 广告拦截"
    type: select
    proxies: [REJECT, DIRECT]

  - name: "🔒 国内服务"
    type: select
    proxies: [DIRECT, "🚀 节点选择"]

  - name: "🐟 漏网之鱼"
    type: select
    proxies: ["🚀 节点选择", DIRECT]

rule-providers:
  # 仅保留核心分类，极大减少资源占用
  ads: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs", path: ./ruleset/ads.mrs, interval: 86400, format: mrs}
  ai: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-chat-!cn.mrs", path: ./ruleset/ai.mrs, interval: 86400, format: mrs}
  cn: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-cn.mrs", path: ./ruleset/cn.mrs, interval: 86400, format: mrs}
  proxy: {type: http, behavior: domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs", path: ./ruleset/proxy.mrs, interval: 86400, format: mrs}
  cn-ip: {type: http, behavior: ipcidr, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs", path: ./ruleset/cn-ip.mrs, interval: 86400, format: mrs}

rules:
  - DOMAIN-KEYWORD,96518,DIRECT
  - RULE-SET,ads,🛑 广告拦截
  - RULE-SET,ai,🤖 AI 服务
  - RULE-SET,cn,🔒 国内服务
  - RULE-SET,proxy,🚀 节点选择
  - RULE-SET,cn-ip,🔒 国内服务,no-resolve
  - GEOIP,lan,DIRECT
  - MATCH,🐟 漏网之鱼