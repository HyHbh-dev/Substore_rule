# 基础配置：优化移动端连接与省电
mixed-port: 7897
allow-lan: false
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

# DNS 配置：兼顾响应速度与解析准确性
dns:
  enable: true
  listen: "127.0.0.1:5335"
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  fallback-filter:
    geoip: true
    ipcidr: [240.0.0.0/4, 0.0.0.0/32, 127.0.0.1/32]

# ---------------------------------------------------
# 节点信息：在此处粘贴你的代理节点
proxies: 
  # - {name: "示例节点", type: ss, server: ..., ...}

# ---------------------------------------------------

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT, 香港, 美国, 土耳其, 台湾] # 此处填入上面定义的节点名

  - name: "⚡ 自动选择"
    type: url-test
    proxies: [香港, 美国, 土耳其, 台湾] # 此处填入需要参与测速的节点
    url: "http://www.gstatic.com/generate_204"
    interval: 300

  - name: "🤖 AI 服务"
    type: select
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT, 香港, 美国, 土耳其, 台湾]

  - name: "🛑 广告拦截"
    type: select
    proxies: [REJECT, DIRECT]

  - name: "🔒 国内服务"
    type: select
    proxies: [DIRECT, "🚀 节点选择"]

  - name: "🐟 漏网之鱼"
    type: select
    proxies: ["🚀 节点选择", "⚡ 自动选择", DIRECT, REJECT, 香港, 美国, 土耳其, 台湾]

# 规则集定义：通过 MRS 二进制格式大幅提升手机端加载速度
rule-providers:
  ads: 
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs"
    path: ./ruleset/ads.mrs
    interval: 86400
    format: mrs
  ai: 
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-chat-!cn.mrs"
    path: ./ruleset/ai.mrs
    interval: 86400
    format: mrs
  cn_site: 
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-cn.mrs"
    path: ./ruleset/cn_site.mrs
    interval: 86400
    format: mrs
  proxy_site: 
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs"
    path: ./ruleset/proxy_site.mrs
    interval: 86400
    format: mrs
  cn_ip: 
    type: http
    behavior: ipcidr
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs"
    path: ./ruleset/cn_ip.mrs
    interval: 86400
    format: mrs

# 规则逻辑：从上到下匹配，匹配即停止
rules:
  - DOMAIN-KEYWORD,96518,DIRECT
  - RULE-SET,ads,🛑 广告拦截
  - RULE-SET,ai,🤖 AI 服务
  - RULE-SET,cn_site,🔒 国内服务
  - RULE-SET,proxy_site,🚀 节点选择
  - RULE-SET,cn_ip,🔒 国内服务,no-resolve
  - GEOIP,lan,DIRECT
  - MATCH,🐟 漏网之鱼