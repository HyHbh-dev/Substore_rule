profile:
  store-selected: true
  store-fake-ip: false
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    HTTP: { ports: [80, 8080-8880], override-destination: true }
    QUIC: { ports: [443, 8443] }
    TLS: { ports: [443, 8443] }
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
